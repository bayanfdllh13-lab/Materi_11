<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodata Mahasiswa</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f2;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
}

.card{
    background:white;
    border-radius:30px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    font-size:3rem;
    color:#222;
    margin-bottom:25px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.biodata-card{
    display:none;
    margin-top:25px;
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    animation:muncul .5s ease;
}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.avatar{
    width:75px;
    height:75px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#4f46e5);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
}

.profile h2{
    color:#222;
}

.profile span{
    color:#666;
}

.info{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.item{
    background:#f8fafc;
    padding:15px;
    border-radius:12px;
}

.item label{
    display:block;
    color:#777;
    font-size:13px;
    margin-bottom:5px;
}

.item p{
    font-size:16px;
    font-weight:600;
    color:#222;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:600px){

    h1{
        font-size:2rem;
    }

    .info{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Biodata Mahasiswa</h1>

        <button id="btnBiodata" onclick="tampilkanBiodata()">
            Tampilkan Biodata
        </button>

        <div id="biodata" class="biodata-card">

            <div class="profile">

                <div class="avatar">
                    AB
                </div>

                <div>
                    <h2>Ahmad Bayan Fadillah</h2>
                    <span>Mahasiswa Teknologi Informasi</span>
                </div>

            </div>

            <div class="info">

                <div class="item">
                    <label>NPM</label>
                    <p>2025806087</p>
                </div>

                <div class="item">
                    <label>Kelas</label>
                    <p>TI 2</p>
                </div>

                <div class="item">
                    <label>Program Studi</label>
                    <p>Teknologi Informasi</p>
                </div>

                <div class="item">
                    <label>Hobi</label>
                    <p>Olahraga</p>
                </div>

            </div>

        </div>

    </div>

</div>

<script>

function tampilkanBiodata(){

    const biodata = document.getElementById("biodata");
    const tombol = document.getElementById("btnBiodata");

    if(biodata.style.display === "block"){
        biodata.style.display = "none";
        tombol.innerHTML = "Tampilkan Biodata";
    }else{
        biodata.style.display = "block";
        tombol.innerHTML = "Sembunyikan Biodata";
    }

}

</script>

</body>
</html>
