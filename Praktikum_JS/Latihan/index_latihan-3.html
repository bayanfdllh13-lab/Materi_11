<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Modern</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f2;
}

.calculator{
    width:350px;
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.title{
    text-align:center;
    margin-bottom:15px;
    color:#333;
}

.display{
    width:100%;
    height:80px;
    border:none;
    background:#f8fafc;
    border-radius:15px;
    text-align:right;
    font-size:30px;
    padding:20px;
    margin-bottom:20px;
    color:#222;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:15px;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#f1f5f9;
}

.operator{
    background:#2563eb;
    color:white;
}

.equal{
    background:#16a34a;
    color:white;
}

.clear{
    background:#ef4444;
    color:white;
}

</style>
</head>
<body>

<div class="calculator">

    <h2 class="title">Kalkulator Modern</h2>

    <input type="text" id="display" class="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button class="operator" onclick="append('*')">×</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="equal" onclick="calculate()" rowspan="2">=</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>

</div>

<script>

function append(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function calculate(){

    try{
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    }
    catch{
        document.getElementById("display").value = "Error";
    }

}

</script>

</body>
</html>
