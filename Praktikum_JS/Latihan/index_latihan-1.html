<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubah Warna Teks Premium</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    background:#f5f5f2;
    color:#222;
    padding:40px 20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:3rem;
    font-weight:600;
}

.header p{
    margin-top:10px;
    color:#666;
}

#jam{
    margin-top:15px;
    font-size:14px;
    color:#888;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.text-area{
    height:220px;
    border:2px dashed #ddd;
    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    margin-bottom:30px;
}

#teks{
    font-size:2.3rem;
    text-align:center;
    transition:all .4s ease;
}

.fade{
    opacity:0;
    transform:scale(0.95);
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
}

button{
    border:none;
    padding:14px 25px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

.merah{background:#e74c3c;color:white;}
.biru{background:#3498db;color:white;}
.hijau{background:#2ecc71;color:white;}
.ungu{background:#9b59b6;color:white;}
.acak{background:#f39c12;color:white;}

.reset{
    background:white;
    border:1px solid #ccc;
}

.footer{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:#faf8f2;
}

.footer h3{
    margin-bottom:8px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Ubah Warna Teks</h1>
        <p>Pilih warna dan lihat perubahan secara langsung</p>
        <div id="jam"></div>
    </div>

    <div class="card">

        <div class="text-area">
            <h2 id="teks">Teknologi mempermudah pekerjaan manusia.</h2>
        </div>

        <div class="buttons">

            <button class="merah"
            onclick="ubahWarna('#e74c3c')">
            Merah
            </button>

            <button class="biru"
            onclick="ubahWarna('#3498db')">
            Biru
            </button>

            <button class="hijau"
            onclick="ubahWarna('#2ecc71')">
            Hijau
            </button>

            <button class="ungu"
            onclick="ubahWarna('#9b59b6')">
            Ungu
            </button>

            <button class="acak"
            onclick="warnaAcak()">
            Warna Acak
            </button>

            <button class="reset"
            onclick="resetWarna()">
            Reset
            </button>

        </div>

    </div>

    <div class="footer">
        <h3>Informasi</h3>
        <p>
            Aplikasi sederhana menggunakan HTML, CSS, dan JavaScript
            untuk mengubah warna teks secara interaktif.
        </p>
    </div>

</div>

<script>

function animasi(){
    const teks = document.getElementById("teks");

    teks.classList.add("fade");

    setTimeout(()=>{
        teks.classList.remove("fade");
    },200);
}

function ubahWarna(warna){
    animasi();
    document.getElementById("teks").style.color = warna;
}

function warnaAcak(){

    animasi();

    const warna =
    "#" + Math.floor(Math.random()*16777215).toString(16);

    document.getElementById("teks").style.color = warna;
}

function resetWarna(){
    animasi();
    document.getElementById("teks").style.color = "#222";
}

function updateJam(){

    const sekarang = new Date();

    document.getElementById("jam").innerHTML =
    sekarang.toLocaleTimeString("id-ID");
}

setInterval(updateJam,1000);
updateJam();

</script>

</body>
</html>
